<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>White Matter Systems LLC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wm: {
              dark: '#0a0e1a',
              accent: '#4fc3f7',
              accent2: '#7c4dff',
              text: '#e8eaf6',
              muted: '#90a4ae',
            }
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-wm-dark text-wm-text font-sans">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-wm-dark/95 backdrop-blur-md border-b border-white/[0.08]">
    <div class="max-w-6xl mx-auto px-8 py-6 flex items-center justify-between">
      <a href="#" class="flex items-center gap-2 text-wm-text font-semibold text-lg tracking-tight">
          <img src="whitemattersystems.svg" alt="White Matter Systems logo" class="h-7 w-auto">
          White Matter Systems
        </a>
      <ul class="hidden md:flex items-center gap-8">
        <li><a href="#expertise" class="text-wm-muted text-base font-medium hover:text-wm-text transition-colors">Expertise</a></li>
        <li><a href="#about" class="text-wm-muted text-base font-medium hover:text-wm-text transition-colors">About</a></li>
        <li><a href="#contact" class="bg-wm-accent text-wm-dark text-base font-semibold px-5 py-2.5 rounded-md hover:opacity-85 transition-opacity">Get in touch</a></li>
      </ul>
      <button id="hamburger" class="md:hidden flex flex-col gap-[5px] p-1" aria-label="Menu">
        <span class="block w-5 h-0.5 bg-wm-text rounded"></span>
        <span class="block w-5 h-0.5 bg-wm-text rounded"></span>
        <span class="block w-5 h-0.5 bg-wm-text rounded"></span>
      </button>
    </div>
    <div id="mobileMenu" class="hidden md:hidden flex-col gap-3 px-6 pb-4 border-t border-white/[0.08]">
      <a href="#expertise" class="text-wm-muted text-sm font-medium py-2 border-b border-white/[0.08]">Expertise</a>
      <a href="#about" class="text-wm-muted text-sm font-medium py-2 border-b border-white/[0.08]">About</a>
      <a href="#contact" class="bg-wm-accent text-wm-dark text-sm font-semibold px-4 py-2 rounded-md text-center mt-1">Get in touch</a>
    </div>
  </nav>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      mobileMenu.classList.toggle('flex');
    });
  </script>

</body>
</html>
